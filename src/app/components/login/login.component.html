<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<div class="login-wrapper">
    <div class="login-box">
        <img src="assets/img/mascota.png" alt="Logo" class="login-logo">
        <h2>{{ modoRegistro ? 'Crear Cuenta' : 'Iniciar Sesión' }}</h2>

        <!-- Agregamos #authForm="ngForm" para que Angular maneje bien el formulario -->
        <form (ngSubmit)="onSubmit()" #authForm="ngForm">

            <div class="form-group">
                <!-- El 'for' del label debe coincidir con el 'id' del input -->
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" [(ngModel)]="form.email" placeholder="ejemplo@correo.com"
                    required autocomplete="username">
                <!-- "username" es el estándar para el correo de inicio de sesión -->
            </div>

            <div class="form-group">
                <div class="form-group password-group">
                    <label for="password">Contraseña</label>

                    <div class="password-input">
                        <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
                            [(ngModel)]="form.password" placeholder="******" required
                            [attr.autocomplete]="modoRegistro ? 'new-password' : 'current-password'">

                        <button type="button" class="toggle-password" (click)="showPassword = !showPassword">

                            <span class="material-icons">
                                {{ showPassword ? 'visibility_off' : 'visibility' }}
                            </span>
                        </button>
                    </div>
                </div>
            </div>

            <button type="submit" class="btn-auth">
                {{ modoRegistro ? 'Registrarse' : 'Ingresar' }}
            </button>
        </form>

        <p class="toggle-auth" (click)="modoRegistro = !modoRegistro">
            {{ modoRegistro ? '¿Ya tienes cuenta? Inicia Sesión' : '¿No tienes cuenta? Regístrate aquí' }}
        </p>
    </div>
</div>
