<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<div class="login-wrapper">
    <!-- Añadimos una clase dinámica basada en modoRegistro -->
    <div class="login-box" [class.register-active]="modoRegistro">
        <img src="assets/img/mascota.png" alt="Logo" class="login-logo">

        <!-- Contenedor para el título con animación -->
        <div class="header-container">
            <h2 *ngIf="!modoRegistro" class="fade-in">Iniciar Sesión</h2>
            <h2 *ngIf="modoRegistro" class="fade-in">Crear Cuenta</h2>
        </div>

        <form (ngSubmit)="onSubmit()" #authForm="ngForm" class="auth-form">

            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" [(ngModel)]="form.email" 
                       placeholder="ejemplo@correo.com" required autocomplete="username">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <div class="password-input">
                    <input [type]="showPassword ? 'text' : 'password'" id="password" name="password"
                        [(ngModel)]="form.password" placeholder="******" required
                        [attr.autocomplete]="modoRegistro ? 'new-password' : 'current-password'">
                    <button type="button" class="toggle-password" (click)="showPassword = !showPassword">
                        <span class="material-icons">
                            {{ showPassword ? 'visibility_off' : 'visibility' }}
                        </span>
                    </button>
                </div>
            </div>

            <!-- Botón con cambio de texto animado -->
            <button type="submit" class="btn-auth">
                <span *ngIf="!modoRegistro" class="fade-in">Ingresar</span>
                <span *ngIf="modoRegistro" class="fade-in">Registrarse</span>
            </button>
        </form>

        <!-- Link de cambio mejorado -->
        <div class="toggle-container">
            <p class="toggle-auth" (click)="modoRegistro = !modoRegistro">
                {{ modoRegistro ? '¿Ya tienes cuenta? Inicia Sesión' : '¿No tienes cuenta? Regístrate aquí' }}
            </p>
        </div>
    </div>
</div>
